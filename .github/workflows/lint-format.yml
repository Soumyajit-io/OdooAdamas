name: Lint, Format and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-format:
    name: Lint & Format Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Ruff Lint
        uses: astral-sh/ruff-action@v3
        with:
          args: "check"

      - name: Run Ruff Format
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  test:
    name: Run Tests
    needs: lint-format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --frozen

      - name: Run Tests
        run: uv run pytest
